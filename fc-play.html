<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NOT Sports · Player</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #07080d;
      --surface:    #0e1018;
      --card:       #111319;
      --accent:     #e8003d;
      --accent-dim: rgba(232,0,61,0.25);
      --text:       #f0f2f8;
      --text-sub:   #7a829e;
      --text-muted: #4a5070;
      --border:     rgba(255,255,255,0.07);
      --pill-bg:    rgba(255,255,255,0.04);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .player-header {
      height: 52px;
      background: rgba(11,12,18,0.95);
      border-bottom: 1px solid rgba(232,0,61,0.15);
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 200;
      backdrop-filter: blur(12px);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text-sub);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      transition: color 0.2s, border-color 0.2s;
    }

    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
      margin-left: 0.25rem;
    }

    .hl-not {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.35rem;
      color: var(--text);
      letter-spacing: -0.5px;
      position: relative;
      line-height: 1;
    }

    .hl-not::after {
      content: '';
      position: absolute;
      left: -1px;
      top: 50%;
      width: calc(100% + 2px);
      height: 2px;
      background: var(--accent);
      transform: translateY(-50%) rotate(-6deg);
      border-radius: 2px;
    }

    .hl-sports {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.35rem;
      color: var(--accent);
      line-height: 1;
    }

    .hl-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    /* ── PAGE LAYOUT ── */
    .page-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 3rem;
    }

    /* ── PLAYER SECTION ── */
    .player-section {
      width: 100%;
      background: #000;
      border-radius: 1rem;
      /* No overflow:hidden — it clips Shaka's control menus */
      position: relative;
      border: 1px solid rgba(232,0,61,0.12);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }

    /* Aspect-ratio wrapper gives the player its 16:9 shape */
    .video-aspect {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
    }

    /* Shaka container fills the aspect wrapper — must NOT be absolute (would collapse to 0) */
    #shakaContainer {
      width: 100%;
      height: 100%;
      display: block;
      position: relative;
    }

    /* Video element must fill its Shaka container */
    #shakaContainer video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      object-fit: contain;
    }

    /* Controls layer sits on top with pointer events */
    .shaka-video-container .shaka-controls-container {
      pointer-events: auto !important;
      z-index: 10 !important;
    }

    .shaka-video-container .shaka-scrim-container {
      pointer-events: none !important;
    }

    /* Bare video fallback */
    video {
      width: 100%;
      height: 100%;
      background: #000;
      display: block;
    }

    /* ── PLAYER BAR (below video, above match list) ── */
    .player-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 1rem 1rem;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .pb-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .live-badge {
      background: var(--accent);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      padding: 0.2rem 0.65rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .live-badge .pdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .pb-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
    }

    .fs-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      color: var(--text-sub);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      font-family: 'Space Grotesk', sans-serif;
      flex-shrink: 0;
    }

    .fs-btn:hover {
      color: var(--text);
      border-color: rgba(232,0,61,0.4);
      background: rgba(232,0,61,0.06);
    }

    /* ── MATCH LIST SECTION ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 1.75rem 0 1rem;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
    }

    .section-title span { color: var(--accent); }

    .live-pill {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
      border: 1px solid rgba(232,0,61,0.3);
      background: rgba(232,0,61,0.07);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
    }

    /* Horizontal scroll row on mobile, grid on desktop */
    .match-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    /* Mini match card */
    .mini-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0.75rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }

    .mini-card:hover {
      border-color: rgba(232,0,61,0.4);
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(232,0,61,0.12);
    }

    .mini-card.is-current {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(232,0,61,0.25), 0 10px 24px rgba(232,0,61,0.15);
    }

    .mini-img {
      position: relative;
      height: 140px;
      overflow: hidden;
      background: #0c0e14;
    }

    .mini-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      filter: brightness(0.85);
      transition: transform 0.4s ease;
    }

    .mini-card:hover .mini-img img { transform: scale(1.05); }

    .mini-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(7,8,13,0.8) 100%);
    }

    .mini-live {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 1.2px;
      padding: 0.18rem 0.5rem;
      border-radius: 3px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 3px;
      box-shadow: 0 0 12px rgba(232,0,61,0.6);
    }

    .mini-live .mdot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 1.4s infinite;
    }

    .current-tag {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: var(--accent);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 0.18rem 0.5rem;
      border-radius: 3px;
      z-index: 5;
      border: 1px solid rgba(232,0,61,0.3);
    }

    .mini-cat {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.55);
      color: var(--text-sub);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      z-index: 5;
      backdrop-filter: blur(4px);
    }

    .mini-body {
      padding: 0.75rem;
      flex: 1;
    }

    .mini-event {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .mini-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .mini-teams {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 0.4rem;
    }

    .mini-teams .vs { color: var(--text-muted); font-size: 0.6rem; font-weight: 700; }

    .mini-play-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mini-time {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .mini-play-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 0.32rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .mini-play-btn:hover { background: #c8002f; }

    .mini-play-btn.locked {
      background: var(--surface);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* ── SKELETON ── */
    .mini-skel {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .skel-pulse {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.03) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .skel-img-mini { height: 140px; }
    .skel-body-mini { padding: 0.75rem; }
    .skel-line-mini {
      height: 10px;
      border-radius: 3px;
      margin-bottom: 8px;
    }
    .w-50 { width: 50%; }
    .w-75 { width: 75%; }
    .w-35 { width: 35%; }

    /* ── SHAKA YOUTUBE THEME ── */
    @font-face {
      font-family: 'Roboto';
      font-weight: 400;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/roboto/v27/KFOmCnqEu92Fr1Me5Q.ttf) format('truetype');
    }
    @font-face {
      font-family: 'Roboto';
      font-weight: 500;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/roboto/v27/KFOlCnqEu92Fr1MmEU9vAw.ttf) format('truetype');
    }

    .youtube-theme { font-family: 'Roboto', sans-serif; }
    .youtube-theme .shaka-bottom-controls { width: 100%; padding: 0; padding-bottom: 0; z-index: 1; display: flex; flex-direction: column; }
    .youtube-theme .shaka-ad-controls { order: 1; }
    .youtube-theme .shaka-controls-button-panel { order: 2; height: 60px; padding: 0 10px; }
    .youtube-theme .shaka-range-container { margin: 4px 10px; top: 0; }
    .youtube-theme .shaka-small-play-button { order: -3; }
    .youtube-theme .shaka-mute-button { order: -2; }
    .youtube-theme .shaka-controls-button-panel > * { margin: 0; padding: 3px 8px; color: #EEE; height: 60px; }
    .youtube-theme .shaka-controls-button-panel > *:focus { outline: none; box-shadow: inset 0 0 0 2px rgba(27,127,204,0.8); color: #FFF; }
    .youtube-theme .shaka-controls-button-panel > *:hover { color: #FFF; }
    .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container { position: relative; z-index: 10; left: -1px; order: -1; opacity: 0; width: 0; height: 3px; transition: width 0.2s cubic-bezier(0.4,0,1,1); padding: 0; }
    .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container:hover, .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container:focus { display: block; width: 50px; opacity: 1; padding: 0 6px; }
    .youtube-theme .shaka-mute-button:hover + div { opacity: 1; width: 50px; padding: 0 6px; }
    .youtube-theme .shaka-current-time { padding: 0 10px; font-size: 12px; }
    .youtube-theme .shaka-seek-bar-container { height: 3px; position: relative; top: -1px; border-radius: 0; margin-bottom: 0; }
    .youtube-theme .shaka-seek-bar-container .shaka-range-element { opacity: 0; }
    .youtube-theme .shaka-seek-bar-container:hover { height: 5px; top: 0; cursor: pointer; }
    .youtube-theme .shaka-seek-bar-container:hover .shaka-range-element { opacity: 1; cursor: pointer; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-webkit-slider-thumb { background: #e8003d; cursor: pointer; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-moz-range-thumb { background: #e8003d; cursor: pointer; }
    .youtube-theme .shaka-seek-bar { background: rgba(255,255,255,.2) !important; }
    .youtube-theme .shaka-buffered-range { background: rgba(255,255,255,.4) !important; }
    .youtube-theme .shaka-played-range { background: #e8003d !important; }
    .youtube-theme .shaka-overflow-menu, .youtube-theme .shaka-settings-menu { border-radius: 2px; background: rgba(28,28,28,0.9); transition: opacity 0.1s; right: 10px; bottom: 50px; padding: 8px 0; min-width: 200px; }
    .youtube-theme .shaka-settings-menu { padding: 0 0 8px 0; }
    .youtube-theme .shaka-settings-menu button { font-size: 12px; }
    .youtube-theme .shaka-settings-menu button span { margin-left: 33px; font-size: 13px; }
    .youtube-theme .shaka-settings-menu button[aria-selected="true"] { display: flex; }
    .youtube-theme .shaka-settings-menu button[aria-selected="true"] span { order: 2; margin-left: 0; }
    .youtube-theme .shaka-settings-menu button[aria-selected="true"] i { order: 1; font-size: 18px; padding-left: 5px; }
    .youtube-theme .shaka-overflow-menu button { padding: 0; }
    .youtube-theme .shaka-overflow-menu button i { display: none; }
    .youtube-theme .shaka-overflow-menu button .shaka-overflow-button-label { display: flex; justify-content: space-between; flex-direction: row; align-items: center; cursor: default; outline: none; height: 60px; flex: 0 0 100%; }
    .youtube-theme .shaka-overflow-menu button .shaka-overflow-button-label span { flex-shrink: initial; padding-left: 15px; font-size: 13px; font-weight: 500; display: flex; align-items: center; }
    .youtube-theme .shaka-overflow-menu span + span { color: #FFF; font-weight: 400 !important; font-size: 12px !important; padding-right: 8px; padding-left: 0 !important; }
    .youtube-theme .shaka-overflow-menu span + span:after { content: "navigate_next"; font-family: 'Material Icons Sharp'; font-size: 20px; }
    .youtube-theme .shaka-back-to-overflow-button { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.2); font-size: 12px; color: #eee; height: 60px; }
    .youtube-theme .shaka-back-to-overflow-button .material-icons-round { font-size: 15px; padding-right: 10px; }
    .youtube-theme .shaka-overflow-menu button:hover, .youtube-theme .shaka-settings-menu button:hover { background-color: rgba(255,255,255,0.1); cursor: pointer; }
    .youtube-theme .shaka-overflow-menu button, .youtube-theme .shaka-settings-menu button { color: #EEE; }
    .youtube-theme .shaka-fullscreen-button:hover { font-size: 25px; transition: font-size 0.1s; }
    .shaka-spinner-container, .shaka-spinner, .shaka-spinner-svg { display: none !important; visibility: hidden !important; opacity: 0 !important; }

    /* ── ERROR STATE ── */
    .player-error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #000;
      color: var(--text-sub);
      padding: 3rem 1rem;
      border-radius: 0 0 1rem 1rem;
    }

    .player-error.visible { display: flex; }
    .player-error i { font-size: 2.5rem; color: var(--accent); opacity: 0.6; }
    .player-error p { font-size: 0.9rem; }

    /* ── EMPTY STATE ── */
    .empty-list {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-muted);
      padding: 2rem 0;
      font-size: 0.9rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .page-wrap { padding: 0.75rem 0.75rem 3rem; }
      .match-list { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
      .pb-title { max-width: 180px; font-size: 0.82rem; }
    }

    @media (max-width: 400px) {
      .match-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="player-header">
    <a href="/" class="back-btn">
      <i class="fas fa-chevron-left" style="font-size:0.75rem"></i> Back
    </a>
    <a href="/" class="header-logo">
      <span class="hl-not">NOT</span>
      <div class="hl-dot"></div>
      <span class="hl-sports">Sports</span>
    </a>
  </header>

  <!-- PAGE -->
  <div class="page-wrap">

    <!-- ── PLAYER ── -->
    <div class="player-section" id="player-section">
      <div class="video-aspect">
        <div class="shaka-video-container youtube-theme" id="shakaContainer" data-shaka-player>
          <video id="video" autoplay muted playsinline preload="auto"></video>
        </div>
      </div>
      <div class="player-error" id="player-error">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Stream unavailable. Try another match.</p>
      </div>
    </div>

    <!-- PLAYER BAR -->
    <div class="player-bar" id="player-bar">
      <div class="pb-left">
        <span class="live-badge"><span class="pdot"></span>LIVE</span>
        <span class="pb-title" id="pb-title">Loading stream…</span>
      </div>
      <button class="fs-btn" onclick="goFullscreen()">
        <i class="fas fa-expand"></i> Fullscreen
      </button>
    </div>

    <!-- ── MATCH LIST ── -->
    <div class="section-header">
      <h2 class="section-title">More <span>Matches</span></h2>
      <span class="live-pill" id="live-pill">Loading…</span>
    </div>

    <div class="match-list" id="match-list">
      <!-- skeletons -->
      <div class="mini-skel"><div class="skel-pulse skel-img-mini"></div><div class="skel-body-mini"><div class="skel-line-mini skel-pulse w-35"></div><div class="skel-line-mini skel-pulse w-75"></div><div class="skel-line-mini skel-pulse w-50"></div></div></div>
      <div class="mini-skel"><div class="skel-pulse skel-img-mini"></div><div class="skel-body-mini"><div class="skel-line-mini skel-pulse w-35"></div><div class="skel-line-mini skel-pulse w-75"></div><div class="skel-line-mini skel-pulse w-50"></div></div></div>
      <div class="mini-skel"><div class="skel-pulse skel-img-mini"></div><div class="skel-body-mini"><div class="skel-line-mini skel-pulse w-35"></div><div class="skel-line-mini skel-pulse w-75"></div><div class="skel-line-mini skel-pulse w-50"></div></div></div>
      <div class="mini-skel"><div class="skel-pulse skel-img-mini"></div><div class="skel-body-mini"><div class="skel-line-mini skel-pulse w-35"></div><div class="skel-line-mini skel-pulse w-75"></div><div class="skel-line-mini skel-pulse w-50"></div></div></div>
    </div>

  </div><!-- /page-wrap -->

  <script>
    /* ─────────────────────────────────────────────
       CONFIG
    ───────────────────────────────────────────── */
    const DATA_URL   = "https://raw.githubusercontent.com/drmlive/fancode-live-events/refs/heads/main/fancode.json";
    const PROXY_BASE = '/api/proxy?u=';
    const PLAYER_URL = '/fc-play?url=';

    const queryParams = new URLSearchParams(window.location.search);
    const rawUrl      = queryParams.get('url');
    const streamUrl   = rawUrl ? PROXY_BASE + encodeURIComponent(rawUrl) : null;

    let player;
    let allMatches   = [];
    let currentRawUrl = rawUrl;

    const video       = document.getElementById('video');
    const pbTitle     = document.getElementById('pb-title');
    const matchList   = document.getElementById('match-list');
    const livePill    = document.getElementById('live-pill');
    const playerError = document.getElementById('player-error');
    const playerSec   = document.getElementById('player-section');

    /* ─────────────────────────────────────────────
       SHAKA INIT
    ───────────────────────────────────────────── */
    async function initPlayer(url) {
      if (!url) {
        playerError.classList.add('visible');
        return;
      }

      try {
        if (!player) {
          // Install polyfills first
          shaka.polyfill.installAll();

          player = new shaka.Player();
          await player.attach(video);

          const shakaContainer = document.getElementById('shakaContainer');

          // Build the UI overlay — container must be the shaka-video-container div
          const ui = new shaka.ui.Overlay(player, shakaContainer, video);

          ui.configure({
            seekBarColors: {
              base:     'rgba(255,255,255,.2)',
              buffered: 'rgba(255,255,255,.4)',
              played:   '#e8003d'
            },
            addSeekBar: true,
            addBigPlayButton: true,
            controlPanelElements: [
              'play_pause', 'mute', 'time_and_duration', 'restart',
              'spacer', 'quality', 'language', 'picture_in_picture',
              'fullscreen', 'overflow_menu'
            ]
          });

          player.configure({
            streaming: { bufferingGoal: 10, rebufferingGoal: 2, bufferBehind: 30 },
            manifest: { retryParameters: { timeout: 30000, maxAttempts: 2, baseDelay: 1000, backoffFactor: 2 } }
          });

          video.autoplay  = true;
          video.controls  = false;
          video.volume    = 1;
          video.muted     = false;
          video.preload   = 'auto';
        } else {
          await player.unload();
        }

        playerError.classList.remove('visible');
        await player.load(url);

        try {
          await video.play();
        } catch {
          video.muted = true;
          await video.play();
        }

      } catch (err) {
        console.error('Player error:', err);
        // Fallback to native video
        video.src = url;
        video.autoplay = true;
        video.controls = true;
        video.muted = false;
        try { await video.play(); } catch { video.muted = true; await video.play(); }
      }
    }

    /* ─────────────────────────────────────────────
       FULLSCREEN
    ───────────────────────────────────────────── */
    function goFullscreen() {
      const el = playerSec;
      if (el.requestFullscreen)            el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
      else if (el.msRequestFullscreen)     el.msRequestFullscreen();
    }

    /* ─────────────────────────────────────────────
       SWITCH STREAM
    ───────────────────────────────────────────── */
    function switchStream(rawMatchUrl, title) {
      // Update URL bar without reload
      const newParams = new URLSearchParams({ url: rawMatchUrl });
      window.history.pushState({}, '', '/fc-play?' + newParams.toString());
      currentRawUrl = rawMatchUrl;

      // Update title bar
      pbTitle.textContent = title || 'Live Stream';

      // Play
      const proxied = PROXY_BASE + encodeURIComponent(rawMatchUrl);
      initPlayer(proxied);

      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });

      // Refresh current highlights
      renderMatchList(allMatches);
    }

    /* ─────────────────────────────────────────────
       RENDER MATCH LIST
    ───────────────────────────────────────────── */
    function renderMatchList(matches) {
      matchList.innerHTML = '';

      const live = matches.filter(m => m.status === 'LIVE');
      livePill.textContent = live.length ? `${live.length} LIVE` : 'No live matches';

      if (!matches.length) {
        matchList.innerHTML = '<div class="empty-list">No matches available</div>';
        return;
      }

      matches.forEach(match => {
        const isLive    = match.status === 'LIVE';
        const hasStream = isLive && (match.adfree_url || match.dai_url);
        const matchUrl  = match.adfree_url || match.dai_url || '';
        const isCurrent = matchUrl && matchUrl === currentRawUrl;
        const img       = match.src || 'https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg';
        const category  = match.event_category || 'Sports';
        const title     = match.title || match.match_name || 'Match';

        const card = document.createElement('div');
        card.className = 'mini-card' + (isCurrent ? ' is-current' : '');
        if (hasStream && !isCurrent) {
          card.onclick = () => switchStream(matchUrl, title);
        }

        let teamsHtml = '';
        if (match.team_1 && match.team_2) {
          teamsHtml = `<div class="mini-teams"><span>${match.team_1}</span><span class="vs">VS</span><span>${match.team_2}</span></div>`;
        }

        const playBtn = isCurrent
          ? `<span style="font-size:0.65rem;color:var(--accent);font-weight:700;letter-spacing:.5px;">▶ PLAYING</span>`
          : hasStream
            ? `<button class="mini-play-btn" onclick="(function(e){e.stopPropagation(); switchStream('${matchUrl.replace(/'/g,"\\'")}', '${title.replace(/'/g,"\\'")}');})( event )"><i class="fas fa-play" style="font-size:0.6rem"></i> WATCH</button>`
            : `<button class="mini-play-btn locked" disabled>${isLive ? 'No Stream' : 'Upcoming'}</button>`;

        card.innerHTML = `
          <div class="mini-img">
            <img src="${img}" alt="${title}" loading="lazy"
                 onerror="this.src='https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg'">
            ${isLive ? `<span class="mini-live"><span class="mdot"></span>LIVE</span>` : ''}
            ${isCurrent ? `<span class="current-tag">NOW PLAYING</span>` : ''}
            <span class="mini-cat">${category}</span>
          </div>
          <div class="mini-body">
            <div class="mini-event">${match.event_name || 'International'}</div>
            <div class="mini-title">${title}</div>
            ${teamsHtml}
            <div class="mini-play-row">
              <span class="mini-time">${match.startTime || ''}</span>
              ${playBtn}
            </div>
          </div>
        `;

        matchList.appendChild(card);
      });
    }

    /* ─────────────────────────────────────────────
       INIT
    ───────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
      initPlayer(streamUrl);
    });

    // Fetch all matches for the list
    fetch(DATA_URL)
      .then(r => r.json())
      .then(data => {
        allMatches = data.matches || [];

        // Try to find current match title
        if (rawUrl) {
          const current = allMatches.find(m => (m.adfree_url || m.dai_url) === rawUrl);
          if (current) {
            pbTitle.textContent = current.title || current.match_name || 'Live Stream';
          } else {
            pbTitle.textContent = 'Live Stream';
          }
        }

        renderMatchList(allMatches);
      })
      .catch(() => {
        matchList.innerHTML = '<div class="empty-list">Failed to load match list.</div>';
        livePill.textContent = 'Error';
      });
  </script>
</body>
</html>
