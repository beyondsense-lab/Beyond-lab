<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOT Sports</title>
  <link rel="icon" type="image/png" href="https://www.fancode.com/skillup-uploads/fc-web-logo/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg:          #07080d;
      --surface:     #0e1018;
      --card-bg:     #111319;
      --card-border: rgba(232, 0, 61, 0.12);
      --card-hover:  rgba(232, 0, 61, 0.45);
      --accent:      #e8003d;
      --accent-dim:  #9b0028;
      --accent-glow: rgba(232,0,61,0.3);
      --text:        #f0f2f8;
      --text-muted:  #5a6075;
      --text-sub:    #8590aa;
      --header-bg:   rgba(11,12,17,0.9);
      --pill-bg:     rgba(255,255,255,0.04);
      --pill-border: rgba(255,255,255,0.08);
      --score-bg:    #18101a;
      --notlive-bg:  #151820;
      --notlive-c:   #3a4060;
      --modal-bg:    rgba(10,11,16,0.97);
    }

    body.light-mode {
      --bg:          #f0f2f8;
      --surface:     #e4e7f0;
      --card-bg:     rgba(255,255,255,0.9);
      --card-border: rgba(232,0,61,0.15);
      --card-hover:  rgba(232,0,61,0.4);
      --text:        #0b0d16;
      --text-muted:  #8590aa;
      --text-sub:    #4a5070;
      --header-bg:   rgba(240,242,248,0.9);
      --pill-bg:     rgba(0,0,0,0.03);
      --pill-border: rgba(0,0,0,0.08);
      --score-bg:    #e4e7f0;
      --notlive-bg:  #e0e3ee;
      --notlive-c:   #8090b0;
      --modal-bg:    rgba(248,249,255,0.98);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      color: var(--text);
      min-height: 100vh;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* ─── HEADER ─── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(232,0,61,0.18);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    /* Signature logo: NOT strikethrough + Sports */
    .logo-not {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.9rem;
      letter-spacing: -1px;
      color: var(--text);
      position: relative;
      line-height: 1;
    }

    .logo-not::after {
      content: '';
      position: absolute;
      left: -2px;
      top: 50%;
      width: calc(100% + 4px);
      height: 2.5px;
      background: var(--accent);
      transform: translateY(-50%) rotate(-8deg);
      border-radius: 2px;
    }

    .logo-sports {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: var(--accent);
      line-height: 1;
    }

    .logo-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent-glow);
      flex-shrink: 0;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .theme-btn {
      background: rgba(232,0,61,0.08);
      border: 1px solid rgba(232,0,61,0.2);
      border-radius: 50px;
      padding: 0.45rem 1.1rem;
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.2s;
    }

    .theme-btn:hover {
      background: rgba(232,0,61,0.15);
      border-color: var(--accent);
    }

    .live-count {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.5px;
    }

    .live-count span {
      color: var(--accent);
    }

    /* ─── HERO BAR ─── */
    .hero-bar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 2rem 2rem 0;
    }

    .hero-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .hero-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      line-height: 1;
      color: var(--text);
      letter-spacing: -1px;
    }

    .hero-title em {
      font-style: normal;
      color: var(--accent);
    }

    /* ─── MAIN GRID ─── */
    .main-wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.5rem 2rem 5rem;
    }

    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    /* ─── CARD ─── */
    .ns-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 1.25rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.3s ease, transform 0.3s cubic-bezier(0.23,1,0.32,1), box-shadow 0.3s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }

    .ns-card:hover {
      transform: translateY(-6px);
      border-color: var(--card-hover);
      box-shadow: 0 20px 40px rgba(232,0,61,0.15), 0 4px 24px rgba(0,0,0,0.4);
    }

    .ns-img {
      position: relative;
      height: 200px;
      overflow: hidden;
      background: #0c0e14;
    }

    .ns-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      transition: transform 0.6s ease, filter 0.4s ease;
      filter: brightness(0.88) saturate(1.1);
    }

    .ns-card:hover .ns-img img {
      transform: scale(1.06);
      filter: brightness(0.95) saturate(1.2);
    }

    /* Red gradient vignette over image */
    .ns-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(7,8,13,0.85) 100%);
      pointer-events: none;
    }

    /* LIVE badge */
    .badge-live {
      position: absolute;
      top: 14px;
      left: 14px;
      background: var(--accent);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      padding: 0.3rem 0.9rem;
      border-radius: 4px;
      text-transform: uppercase;
      z-index: 10;
      box-shadow: 0 0 16px rgba(232,0,61,0.7), 0 0 32px rgba(232,0,61,0.3);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .badge-live .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 1.4s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* Category chip on image */
    .badge-cat {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-sub);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 4px;
      z-index: 10;
    }

    /* Card body */
    .ns-body {
      padding: 1.1rem 1.25rem 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .ns-tournament {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .ns-match-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
      letter-spacing: -0.2px;
      margin-bottom: 0.7rem;
    }

    /* Team pills */
    .teams-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .team-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      padding: 0.28rem 0.8rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.3px;
      transition: border-color 0.2s, color 0.2s;
    }

    .team-pill:hover {
      border-color: rgba(232,0,61,0.4);
      color: var(--text);
    }

    .vs-divider {
      font-size: 0.65rem;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* Meta row */
    .ns-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .ns-meta i { margin-right: 4px; color: var(--text-muted); }

    /* Spacer */
    .body-spacer { flex: 1; }

    /* Watch button */
    .ns-watch {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 0.85rem 1.2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(232,0,61,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .ns-watch:hover {
      background: #c8002f;
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(232,0,61,0.45);
    }

    .ns-watch:active { transform: translateY(0); }

    .ns-watch.not-live {
      background: var(--notlive-bg);
      color: var(--notlive-c);
      box-shadow: none;
      cursor: not-allowed;
      pointer-events: none;
      opacity: 0.7;
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(2,4,10,0.9);
      backdrop-filter: blur(20px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: var(--modal-bg);
      border: 1px solid rgba(232,0,61,0.3);
      border-radius: 1.25rem;
      padding: 2rem 1.75rem;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(232,0,61,0.15) inset;
    }

    .modal-box h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .modal-box h3 span { color: var(--accent); }

    .quality-btn {
      background: var(--surface);
      border: 1px solid rgba(232,0,61,0.15);
      width: 100%;
      padding: 1rem 1.4rem;
      margin-bottom: 10px;
      border-radius: 8px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
      cursor: pointer;
      transition: all 0.18s;
    }

    .quality-btn:hover {
      border-color: var(--accent);
      background: rgba(232,0,61,0.08);
      transform: translateX(3px);
    }

    .close-btn {
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.2rem;
      display: inline-block;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .close-btn:hover { opacity: 1; }

    /* ─── LOADING STATE ─── */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .skeleton-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 1.25rem;
      overflow: hidden;
    }

    .skel-img {
      height: 200px;
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.03) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }

    .skel-body { padding: 1.25rem; }

    .skel-line {
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.03) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      margin-bottom: 10px;
    }

    .skel-line.w-60 { width: 60%; }
    .skel-line.w-80 { width: 80%; }
    .skel-line.w-40 { width: 40%; }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .site-header { padding: 0 1rem; }
      .main-wrap, .hero-bar { padding-left: 1rem; padding-right: 1rem; }
      .matches-grid { grid-template-columns: 1fr; }
      .live-count { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <a class="logo-wrap" href="#">
      <span class="logo-not">NOT</span>
      <div class="logo-dot"></div>
      <span class="logo-sports">Sports</span>
    </a>
    <div class="header-right">
      <span class="live-count" id="live-count"></span>
      <button class="theme-btn" id="theme-toggle">
        <i class="fas fa-sun" id="theme-icon"></i>
        <span id="theme-label">Light</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero-bar">
    <div class="hero-label">Live Streaming</div>
    <h1 class="hero-title">What's <em>on</em> right now</h1>
  </div>

  <!-- GRID -->
  <div class="main-wrap">
    <div id="matches-container" class="matches-grid">
      <!-- skeleton placeholders -->
      <div class="skeleton-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w-40"></div><div class="skel-line w-80"></div><div class="skel-line w-60"></div></div></div>
      <div class="skeleton-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w-40"></div><div class="skel-line w-80"></div><div class="skel-line w-60"></div></div></div>
      <div class="skeleton-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w-40"></div><div class="skel-line w-80"></div><div class="skel-line w-60"></div></div></div>
    </div>
  </div>

  <!-- QUALITY MODAL -->
  <div id="quality-modal" class="modal-overlay">
    <div class="modal-box">
      <h3>Select <span>Quality</span></h3>
      <div id="quality-list"></div>
      <div class="close-btn" onclick="closeModal()">✕ Cancel</div>
    </div>
  </div>

  <script>
    const DATA_URL  = "https://raw.githubusercontent.com/drmlive/fancode-live-events/refs/heads/main/fancode.json";
    const PLAYER_URL = "/fc-play?url=";

    const container = document.getElementById('matches-container');
    let allMatches = [];

    function renderMatches(matches) {
      container.innerHTML = '';

      if (!matches.length) {
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:4rem 0;font-size:1.1rem;">No matches found</div>';
        return;
      }

      const liveMatches = matches.filter(m => m.status === 'LIVE');
      const liveEl = document.getElementById('live-count');
      if (liveEl && liveMatches.length) {
        liveEl.innerHTML = `<span>${liveMatches.length}</span> LIVE`;
      }

      matches.forEach((match, idx) => {
        const isLive   = match.status === 'LIVE';
        const imageSrc = match.src || 'https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg';
        const category = match.event_category || 'Sports';
        const hasStream = isLive && (match.adfree_url || match.dai_url);

        let teamsHtml = '';
        if (match.team_1 && match.team_2) {
          teamsHtml = `
            <div class="teams-row">
              <span class="team-pill">${match.team_1}</span>
              <span class="vs-divider">VS</span>
              <span class="team-pill">${match.team_2}</span>
            </div>`;
        }

        const watchCls  = hasStream ? 'ns-watch' : 'ns-watch not-live';
        const watchAct  = hasStream ? `onclick="playStream(${idx})"` : '';
        const watchIcon = isLive
          ? (hasStream
              ? `<i class="fas fa-play"></i> Watch Live`
              : `<i class="fas fa-lock"></i> No Stream`)
          : `<i class="fas fa-clock"></i> Upcoming`;

        const card = document.createElement('div');
        card.className = 'ns-card';
        card.innerHTML = `
          <div class="ns-img">
            <img src="${imageSrc}" alt="${match.title || 'match'}" loading="lazy"
                 onerror="this.src='https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg'">
            ${isLive ? `<span class="badge-live"><span class="pulse-dot"></span>LIVE</span>` : ''}
            <span class="badge-cat">${category}</span>
          </div>
          <div class="ns-body">
            <div class="ns-tournament">
              <i class="fas fa-trophy"></i>${match.event_name || 'International'}
            </div>
            <h3 class="ns-match-title">${match.title || match.match_name || 'Match'}</h3>
            ${teamsHtml}
            <div class="ns-meta">
              <span><i class="far fa-calendar-alt"></i>${match.startTime || 'TBD'}</span>
            </div>
            <div class="body-spacer"></div>
            <button class="${watchCls}" ${watchAct}>${watchIcon}</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function playStream(index) {
      const match = allMatches[index];
      const streamUrl = match.adfree_url || match.dai_url;
      if (streamUrl) {
        window.location.href = PLAYER_URL + encodeURIComponent(streamUrl);
      } else {
        alert('Stream not available');
      }
    }

    function closeModal() {
      document.getElementById('quality-modal').style.display = 'none';
    }

    fetch(DATA_URL)
      .then(r => r.json())
      .then(data => {
        allMatches = data.matches || [];
        renderMatches(allMatches);
      })
      .catch(() => {
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:4rem 0;">Failed to load matches. Check your connection.</div>';
      });

    window.onclick = function(e) {
      const modal = document.getElementById('quality-modal');
      if (e.target === modal) modal.style.display = 'none';
    };

    // Theme
    const themeBtn = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const themeLabel = document.getElementById('theme-label');

    function setTheme(isLight) {
      if (isLight) {
        document.body.classList.add('light-mode');
        themeIcon.className = 'fas fa-moon';
        themeLabel.textContent = 'Dark';
        localStorage.setItem('ns-theme', 'light');
      } else {
        document.body.classList.remove('light-mode');
        themeIcon.className = 'fas fa-sun';
        themeLabel.textContent = 'Light';
        localStorage.setItem('ns-theme', 'dark');
      }
    }

    const saved = localStorage.getItem('ns-theme');
    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    setTheme(saved === 'light' || (!saved && prefersLight));

    themeBtn.addEventListener('click', () => {
      setTheme(!document.body.classList.contains('light-mode'));
    });
  </script>
</body>
</html>
